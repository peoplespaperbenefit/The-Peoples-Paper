<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rocket Rogue</title>

<style>
body{
margin:0;
overflow:hidden;
background:#050505;
font-family:Arial;
color:white;
}

canvas{
display:block;
background:
radial-gradient(circle at center,#111,#000);
}

.ui{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

.gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
}
</style>
</head>

<body>

<div class="ui">
Score: <span id="score">0</span>
</div>

<div class="gameover" id="over">
<h1>GAME OVER</h1>
<p>Press R to restart</p>
</div>

<canvas id="game"></canvas>

<script>

const c=document.getElementById("game");
const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;

if(dead && e.key.toLowerCase()==="r"){
reset();
}
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

let player;
let meteors;
let score;
let dead;
let spawn;

function reset(){

player={
x:c.width/2,
y:c.height-120,
size:18,
speed:5
};

meteors=[];

score=0;

dead=false;

spawn=0;

document.getElementById("over").style.display="none";
}

reset();

function meteor(){

let side=Math.random()*4;

let x,y;

if(side<1){
x=Math.random()*c.width;
y=-40;
}

else if(side<2){
x=c.width+40;
y=Math.random()*c.height;
}

else if(side<3){
x=Math.random()*c.width;
y=c.height+40;
}

else{
x=-40;
y=Math.random()*c.height;
}

let angle=Math.atan2(
player.y-y,
player.x-x
);

let speed=
2+
(score/300);

meteors.push({

x,
y,

vx:Math.cos(angle)*speed,

vy:Math.sin(angle)*speed,

r:12+Math.random()*18

});

}

function drawRocket(){

ctx.save();

ctx.translate(
player.x,
player.y
);

ctx.fillStyle="white";

ctx.beginPath();

ctx.moveTo(0,-22);

ctx.lineTo(-12,18);

ctx.lineTo(0,10);

ctx.lineTo(12,18);

ctx.fill();

ctx.restore();

}

function loop(){

ctx.clearRect(
0,
0,
c.width,
c.height
);

if(!dead){

if(keys.w||keys.arrowup)
player.y-=player.speed;

if(keys.s||keys.arrowdown)
player.y+=player.speed;

if(keys.a||keys.arrowleft)
player.x-=player.speed;

if(keys.d||keys.arrowright)
player.x+=player.speed;

player.x=Math.max(
20,
Math.min(
c.width-20,
player.x
));

player.y=Math.max(
20,
Math.min(
c.height-20,
player.y
));

spawn++;

if(
spawn>
Math.max(
20,
80-score/100
)
){
meteor();
spawn=0;
}

score++;

document.getElementById(
"score"
).textContent=
Math.floor(
score/10
);

}

drawRocket();

ctx.fillStyle="#888";

for(let m of meteors){

if(!dead){

m.x+=m.vx;
m.y+=m.vy;

}

ctx.beginPath();

ctx.arc(
m.x,
m.y,
m.r,
0,
7
);

ctx.fill();

let dx=
player.x-m.x;

let dy=
player.y-m.y;

let dist=
Math.sqrt(
dx*dx+
dy*dy
);

if(
dist<
m.r+
player.size
){

dead=true;

document
.getElementById(
"over"
)
.style
.display=
"block";

}

}

requestAnimationFrame(
loop
);

}

loop();

</script>

</body>
</html>
