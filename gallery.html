<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Gallery | The People's Paper</title><!-- Same fonts as main site for consistency --><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville&display=swap" rel="stylesheet"><style>

/* ===== GENERAL STYLING ===== */
body {
    margin: 0;
    font-family: 'Libre Baskerville', serif;
    background: #f8f6f1;
    color: #111;
}

/* ===== HEADER (MATCHES MAIN SITE) ===== */
header {
    background: white;
    border-bottom: 4px double black;
    text-align: center;
    padding: 10px;
}

.top-bar {
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #aaa;
    padding: 5px 10px;
}

h1.masthead {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 3rem;
    margin: 10px 0;
}

.tagline {
    font-size: 0.9rem;
    margin-bottom: 10px;
}

/* ===== NAVIGATION ===== */
    <nav>
        <a href="store.html">Store</a>
        <a href="members.html">Members</a>
        <a href="submission.html">Submit</a>
        <a href="gallery.html">Art Gallery</a> <!-- NEW LINK ADDED -->
    </nav>

/* Highlight current page */
nav a.active {
    text-decoration: underline;
}

/* ===== MAIN CONTENT ===== */
main {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* Page title */
.page-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 10px;
}

/* Intro text */
.gallery-intro {
    margin-bottom: 20px;
    font-size: 0.95rem;
}

/* ===== GALLERY GRID ===== */
/* Adjust number of columns by changing minmax value */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Each artwork card */
.gallery-item {
    background: white;
    border: 1px solid #ccc;
    padding: 10px;
}

/* Image styling */
.gallery-item img {
    width: 100%;
    height: auto;
    display: block;
}

/* Artwork title */
.gallery-item h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin: 10px 0 5px;
}

/* Artist + description */
.gallery-item p {
    font-size: 0.85rem;
}

/* ===== FOOTER ===== */
footer {
    margin-top: 30px;
    border-top: 2px solid black;
    text-align: center;
    padding: 15px;
    background: white;
    font-size: 0.8rem;
}

</style></head><body><header>
    <div class="top-bar">
        <span>March 22, 2026</span>
