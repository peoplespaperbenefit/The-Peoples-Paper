<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art Gallery | The People's Paper</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

/* =========================================================
   GLOBAL FIX
   ========================================================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Libre Baskerville', serif;
    background: #f8f6f1;
    color: #111;
    overflow-x: hidden;
}

img, video, iframe {
    max-width: 100%;
    height: auto;
}

/* =========================================================
   HEADER
   ========================================================= */
header {
    background: white;
    border-bottom: 4px double black;
    text-align: center;
    padding: 10px;
}

.top-bar {
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 5px;
    border-bottom: 1px solid #aaa;
    padding: 5px 10px;
}

h1.masthead {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.5rem);
    margin: 10px 0;
    letter-spacing: 2px;
}

.tagline {
    font-size: 0.9rem;
    margin-bottom: 10px;
}

/* =========================================================
   NAV
   ========================================================= */
.main-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 6px 10px;
    border-top: 1px solid black;
    border-bottom: 1px solid black;
    background: #fdfcf7;
}

.main-nav a {
    text-decoration: none;
    color: #111;
    font-weight: bold;
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 6px;
    white-space: nowrap;
}

.main-nav a::after {
    content: "";
}

.main-nav a:hover {
    text-decoration: underline;
}

.main-nav a.active {
    text-decoration: underline;
}

/* =========================================================
   MAIN
   ========================================================= */
main {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.page-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    border-bottom: 2px solid black;
    padding-bottom: 5px;
    margin-bottom: 15px;
}

.gallery-intro {
    margin-bottom: 20px;
    font-size: 0.95rem;
}

/* =========================================================
   GALLERY
   ========================================================= */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.gallery-item {
    background: white;
    border: 1px solid #ccc;
    padding: 10px;
    cursor: pointer;
}

.gallery-item:hover {
    transform: scale(1.02);
}

.gallery-item img,
.gallery-item video,
.gallery-item iframe {
    width: 100%;
    display: block;
    border-bottom: 1px solid #ccc;
    margin-bottom: 8px;
}

.gallery-item h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin: 5px 0;
}

.gallery-item p {
    font-size: 0.85rem;
}

/* =========================================================
   LIGHTBOX
   ========================================================= */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
}

.lightbox.active {
    display: flex;
}

.lightbox-content {
    max-width: 90%;
    max-height: 90%;
}

.lightbox img,
.lightbox video,
.lightbox iframe {
    width: 100%;
    max-height: 90vh;
}

/* =========================================================
   MOBILE
   ========================================================= */
@media (max-width: 600px) {
    .gallery-grid {
        grid-template-columns: 1fr;
    }
}

/* =========================================================
   FOOTER
   ========================================================= */
footer {
    margin-top: 30px;
    border-top: 2px solid black;
    text-align: center;
    padding: 15px;
    background: white;
    font-size: 0.8rem;
}

</style>
</head>

<body>

<header>
    <div class="top-bar">
        <span>April 20, 2026</span>
        <span>Vol. 1 No. 1</span>
    </div>

    <h1 class="masthead">THE PEOPLE'S PAPER</h1>

    <div class="tagline">
        Create your portfolio with The People's Paper
    </div>

    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="store.html">Store</a>
        <a href="members.html">Members</a>
        <a href="submission.html">Submit</a>
        <a href="gallery.html" class="active">Art Gallery</a>
    </nav>
</header>

<main>
    <div class="page-title">Art Gallery</div>

    <div class="gallery-intro">
        A curated collection of artwork submitted by the public.
    </div>

    <div class="gallery-grid">

        <div class="gallery-item">
            <img src="images/art1.jpg">
            <h3>Artwork</h3>
            <p>By Artist</p>
        </div>

        <div class="gallery-item">
            <video>
                <source src="videos/clip1.mp4" type="video/mp4">
            </video>
            <h3>Short Film</h3>
            <p>By Artist</p>
        </div>

        <div class="gallery-item">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
            <h3>Video Project</h3>
            <p>By Artist</p>
        </div>

    </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox"></div>

<footer>
    © 2026 The People's Paper
</footer>

<script>
const lightbox = document.getElementById("lightbox");

document.querySelectorAll(".gallery-item").forEach(item => {
    item.addEventListener("click", () => {
        let content = item.querySelector("img, video, iframe").cloneNode(true);

        if(content.tagName === "VIDEO") {
            content.setAttribute("controls", true);
            content.setAttribute("autoplay", true);
        }

        lightbox.innerHTML = "";
        lightbox.appendChild(content);
        lightbox.classList.add("active");
    });
});

lightbox.addEventListener("click", () => {
    lightbox.classList.remove("active");
    lightbox.innerHTML = "";
});
</script>

</body>
</html>
