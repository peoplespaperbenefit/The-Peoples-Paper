<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions | The People's Paper</title>
    <style>
        /* General Page Styling */
        body {
            font-family: Georgia, "Times New Roman", serif;
            background-color: #fdfcf7;
            color: #222;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fdfcf7;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2em;
            letter-spacing: 2px;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        p {
            font-size: 1.2em;
        }

        .submission-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .submission-buttons button {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.2em;
            padding: 15px;
            border: 2px solid #333;
            background-color: #fdfcf7;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submission-buttons button:hover {
            background-color: #333;
            color: #fdfcf7;
            border-color: #333;
        }

        footer {
            text-align: center;
            font-size: 0.9em;
            color: #555;
            margin: 60px 0 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>The People's Paper</h1>
        <p>Submit Your Stories, Tips, and Thoughts</p>
    </header>
    <main>
        <h2>Submission Options</h2>
        <p>Please choose an option below to submit your information. We welcome your stories, tips, and letters to the editor!</p>
        <div class="submission-buttons">
            <button onclick="window.location.href='https://forms.gle/FVAbZLBD7H6CoRZ6A'">General Submission</button>
            <button onclick="window.location.href='https://forms.gle/A9QUd8rNNerbVYW68'">Anonymous Submission</button>
        </div>
    </main>
    <footer>
        &copy; 2026 The People's Paper. All Rights Reserved.
    </footer>
</body>
</html>
