<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store | The People's Paper</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

/* =========================================================
   GLOBAL FIX
   ========================================================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Libre Baskerville', serif;
    background: #f8f6f1;
    color: #111;
    overflow-x: hidden;
}

/* Media safety */
img, video, iframe {
    max-width: 100%;
    height: auto;
}

/* =========================================================
   HEADER
   ========================================================= */
header {
    background: white;
    border-bottom: 4px double black;
    text-align: center;
    padding: 10px;
}

.top-bar {
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 5px;
    border-bottom: 1px solid #aaa;
    padding: 5px 10px;
}

h1.masthead {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.5rem);
    margin: 10px 0;
    letter-spacing: 2px;
}

.tagline {
    font-size: 0.9rem;
    margin-bottom: 10px;
}

/* =========================================================
   NAV (MOBILE FIX)
   ========================================================= */
.main-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;   /* FIX */
    gap: 10px;
    padding: 6px 10px;
    border-top: 1px solid black;
    border-bottom: 1px solid black;
    background: #fdfcf7;
}

.main-nav a {
    text-decoration: none;
    color: #111;
    font-weight: bold;
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 6px;
    white-space: nowrap;
}

/* Remove separators (prevents mobile overflow) */
.main-nav a::after {
    content: "";
}

.main-nav a:hover {
    text-decoration: underline;
}

.main-nav a.active {
    text-decoration: underline;
}

/* =========================================================
   MAIN CONTENT
   ========================================================= */
main {
    max-width: 800px;
    margin: auto;
    padding: 80px 20px;
    text-align: center;
}

/* Typography */
.maintenance-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    margin-bottom: 20px;
}

.maintenance-text {
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 15px;
}

.notice {
    margin-top: 30px;
    font-style: italic;
    font-size: 0.95rem;
    color: #444;
}

/* MOBILE SPACING */
@media (max-width: 600px) {
    main {
        padding: 50px 15px;
    }

    .maintenance-text {
        font-size: 1rem;
    }
}
